<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Apple Gift Card Request Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #89d6ff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .loading {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.95) 0 36px, transparent 37px),
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.95) 0 28px, transparent 29px),
        linear-gradient(to bottom, #89d6ff, #ccefff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      font-size: 18px;
      font-weight: bold;
      z-index: 1;
    }

    .loading-card {
      background: #fffef8;
      border: 4px solid #222;
      border-radius: 18px;
      padding: 22px 28px;
      box-shadow: 0 10px 0 rgba(0,0,0,0.2);
      text-align: center;
    }

    .app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      z-index: 2;
      background: white;
    }
  </style>
</head>

<body>
  <div class="loading">
    <div class="loading-card">
      🍄 กำลังเปิดระบบ Apple Gift Card Scanner...
    </div>
  </div>

  <iframe
    class="app-frame"
    src="https://script.google.com/macros/s/AKfycbx-SR2dR7JGWuajJZr5CKLy67VUorX9aBCN63gcYor7KT17FyxwFvtzMDs5WACpaOFA/exec"
    allow="clipboard-read; clipboard-write"
  ></iframe>
</body>
</html>
